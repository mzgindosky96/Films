<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 RetroStation · PS2 Emulator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e17;
            color: #e0e8f0;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(ellipse at center, #141e2b 0%, #070b11 100%);
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(14, 20, 30, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 30px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(255, 200, 50, 0.1);
            border: 1px solid rgba(255, 200, 50, 0.08);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 1px solid #1e2a3a;
            padding-bottom: 15px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 600;
            color: #f5e7b0;
            text-shadow: 0 0 20px rgba(255, 180, 50, 0.2);
        }
        .header h1 i {
            color: #f5c542;
            margin-right: 10px;
        }
        .header .badge {
            background: #1a2535;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            border: 1px solid #2a3a50;
            color: #9ab0cc;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #8aa3c0;
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
        }
        .back-link:hover {
            color: #f5e7b0;
        }
        .emulator-box {
            background: #0c1520;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #1d2a3a;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.4);
        }
        .emulator-box h2 {
            font-size: 18px;
            font-weight: 400;
            color: #b8cee8;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .emulator-box h2 i {
            color: #f5c542;
        }
        #gameCanvas {
            width: 100%;
            aspect-ratio: 4/3;
            background: #080e18;
            border-radius: 16px;
            display: block;
            border: 1px solid #1f2f42;
            image-rendering: pixelated;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .controls button {
            background: #1a2638;
            border: none;
            color: #d0def0;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid #2d3e55;
            box-shadow: 0 3px 0 #0b1119;
        }
        .controls button:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 #0b1119;
        }
        .controls button i {
            color: #f5c542;
        }
        .controls button:hover {
            background: #23324a;
            border-color: #f5c542;
        }
        .controls button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .status-bar {
            background: #111d2b;
            border-radius: 16px;
            padding: 12px 20px;
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border: 1px solid #1f2d3f;
        }
        .status-bar .info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }
        .status-bar .info i {
            color: #f5c542;
        }
        .key-hint {
            font-size: 11px;
            opacity: 0.4;
            margin-top: 8px;
            text-align: center;
        }
        .toast {
            margin-top: 15px;
            background: #111d2b;
            padding: 12px 20px;
            border-radius: 16px;
            border-left: 4px solid #f5c542;
            font-size: 14px;
            color: #b8cee8;
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: 50px;
        }
        .toast i {
            color: #f5c542;
            font-size: 18px;
        }
        .no-rom-msg {
            color: #6a82a0;
            text-align: center;
            padding: 10px;
            font-size: 13px;
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #1a2535;
            border-radius: 50%;
            border-top: 3px solid #f5c542;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-gamepad"></i> RetroStation · PS2</h1>
        <div style="display: flex; gap: 15px; align-items: center;">
            <a href="retrostation-admin.html" class="back-link"><i class="fas fa-cog"></i> Admin Panel</a>
            <span class="badge"><i class="fas fa-microchip"></i> Emulator</span>
        </div>
    </div>

    <div class="emulator-box">
        <h2><i class="fas fa-tv"></i> PS2 Emulator</h2>
        <canvas id="gameCanvas" width="640" height="480"></canvas>
        <div class="controls">
            <button id="playBtn"><i class="fas fa-play"></i> Play</button>
            <button id="pauseBtn"><i class="fas fa-pause"></i> Pause</button>
            <button id="resetBtn"><i class="fas fa-redo-alt"></i> Reset</button>
            <button id="fullscreenBtn"><i class="fas fa-expand"></i> Full</button>
        </div>
        <div class="key-hint">Space: Play/Pause · R: Reset · F: Fullscreen</div>
    </div>

    <div class="status-bar">
        <div class="info">
            <i class="fas fa-circle" id="statusIndicator" style="color:#7bed7b; font-size:12px;"></i>
            <span id="statusText">Ready</span>
        </div>
        <div class="count" id="romInfo">No ROM loaded</div>
    </div>

    <div class="toast" id="toastMessage">
        <i class="fas fa-info-circle"></i>
        <span>Select a ROM from the admin panel to play</span>
    </div>
</div>

<script>
    (function() {
        'use strict';

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let currentRom = null;
        let isPlaying = false;
        let isPaused = false;
        let animFrame = null;
        let frame = 0;

        function toast(msg, isGood = true) {
            const icon = isGood ? 'fa-check-circle' : 'fa-exclamation-triangle';
            document.getElementById('toastMessage').innerHTML = 
                `<i class="fas ${icon}"></i><span>${msg}</span>`;
        }

        function drawPlaceholder(text = '🎮 PS2 Ready') {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#0a121e');
            grad.addColorStop(1, '#162230');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.shadowColor = 'rgba(245,197,66,0.3)';
            ctx.shadowBlur = 30;
            ctx.fillStyle = '#f5e7b0';
            ctx.font = 'bold 42px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, canvas.width/2, canvas.height/2 - 20);
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#6a82a0';
            ctx.font = '18px monospace';
            ctx.fillText('⬆ Select a ROM from admin panel', canvas.width/2, canvas.height/2 + 50);
        }

        function drawGameScreen(romName) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const grad = ctx.createRadialGradient(200, 200, 100, 400, 300, 500);
            grad.addColorStop(0, '#1a2a40');
            grad.addColorStop(1, '#080e18');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.shadowColor = 'rgba(245,197,66,0.2)';
            ctx.shadowBlur = 25;
            ctx.fillStyle = '#f5e7b0';
            ctx.font = 'bold 40px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('PLAYSTATION®2', canvas.width/2, 100);

            ctx.shadowBlur = 0;
            ctx.fillStyle = '#b8cee8';
            ctx.font = '24px monospace';
            ctx.fillText(`🎮 ${romName}`, canvas.width/2, 200);

            ctx.fillStyle = '#6a82a0';
            ctx.font = '16px sans-serif';
            ctx.fillText('⬆ Controls: Play / Pause / Reset', canvas.width/2, 300);

            ctx.fillStyle = 'rgba(255,255,255,0.02)';
            for (let i = 0; i < 20; i++) {
                const y = (frame * 2 + i * 26) % canvas.height;
                ctx.fillRect(0, y, canvas.width, 2);
            }

            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            ctx.fillRect(10, 10, 180, 24);
            ctx.fillStyle = '#8aa3c0';
            ctx.font = '11px monospace';
            ctx.textAlign = 'left';
            ctx.fillText(`▶ ${romName}  ·  ${isPlaying ? 'Playing' : 'Paused'}`, 18, 28);
        }

        function loadRomFromStorage() {
            try {
                const stored = localStorage.getItem('selectedRom');
                if (stored) {
                    const rom = JSON.parse(stored);
                    if (rom && rom.name && rom.dataURL) {
                        currentRom = rom;
                        document.getElementById('romInfo').textContent = `Playing: ${rom.name}`;
                        document.getElementById('statusText').textContent = `Loaded: ${rom.name}`;
                        drawGameScreen(rom.name);
                        toast(`✅ Loaded "${rom.name}" from admin panel`);
                        document.getElementById('playBtn').disabled = false;
                        document.getElementById('pauseBtn').disabled = false;
                        document.getElementById('resetBtn').disabled = false;
                        return true;
                    }
                }
            } catch (e) {
                console.error('Error loading ROM from storage:', e);
            }
            return false;
        }

        function startEmulation() {
            if (!currentRom) {
                toast('Load a ROM first', false);
                return;
            }
            
            if (isPaused) {
                isPaused = false;
                isPlaying = true;
                toast('▶️ Resumed');
                return;
            }
            
            isPlaying = true;
            isPaused = false;
            toast('▶️ Playing');
            
            if (animFrame) {
                cancelAnimationFrame(animFrame);
                animFrame = null;
            }
            
            function emulate() {
                if (!isPlaying || isPaused) {
                    if (!isPaused) {
                        animFrame = null;
                    }
                    return;
                }
                
                drawGameScreen(currentRom.name);
                ctx.fillStyle = `rgba(100,200,255,${0.01 + Math.sin(frame * 0.03) * 0.005})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                for (let i = 0; i < 3; i++) {
                    const x = Math.random() * canvas.width;
                    const y = Math.random() * canvas.height;
                    ctx.fillStyle = `rgba(255,255,255,${0.01 + Math.random() * 0.02})`;
                    ctx.fillRect(x, y, 2, 2);
                }
                
                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.fillRect(canvas.width - 80, 10, 70, 20);
                ctx.fillStyle = '#6a82a0';
                ctx.font = '10px monospace';
                ctx.textAlign = 'right';
                ctx.fillText(`FPS: ${Math.round(60 + Math.sin(frame * 0.1) * 5)}`, canvas.width - 14, 26);
                
                frame++;
                animFrame = requestAnimationFrame(emulate);
            }
            
            emulate();
        }

        function pauseEmulation() {
            if (!currentRom) {
                toast('No ROM loaded', false);
                return;
            }
            
            if (isPlaying && !isPaused) {
                isPaused = true;
                isPlaying = false;
                toast('⏸️ Paused');
                if (animFrame) {
                    cancelAnimationFrame(animFrame);
                    animFrame = null;
                }
                drawGameScreen(currentRom.name);
            } else if (isPaused) {
                isPaused = false;
                isPlaying = true;
                toast('▶️ Resumed');
                startEmulation();
            } else {
                toast('Nothing to pause', false);
            }
        }

        function resetEmulation() {
            if (!currentRom) {
                toast('No ROM loaded', false);
                return;
            }
            
            if (animFrame) {
                cancelAnimationFrame(animFrame);
                animFrame = null;
            }
            
            isPlaying = false;
            isPaused = false;
            frame = 0;
            
            drawGameScreen(currentRom.name);
            toast('🔄 Reset');
            
            setTimeout(() => {
                if (currentRom) {
                    isPlaying = true;
                    startEmulation();
                }
            }, 500);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                canvas.requestFullscreen?.() || canvas.webkitRequestFullscreen?.();
            } else {
                document.exitFullscreen?.() || document.webkitExitFullscreen?.();
            }
        }

        function init() {
            drawPlaceholder('🎮 PS2 Ready');
            
            // Try to load ROM from localStorage
            loadRomFromStorage();

            // Controls
            document.getElementById('playBtn').addEventListener('click', startEmulation);
            document.getElementById('pauseBtn').addEventListener('click', pauseEmulation);
            document.getElementById('resetBtn').addEventListener('click', resetEmulation);
            document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    if (isPlaying && !isPaused) {
                        document.getElementById('pauseBtn').click();
                    } else {
                        document.getElementById('playBtn').click();
                    }
                }
                if (e.key === 'r' || e.key === 'R') {
                    document.getElementById('resetBtn').click();
                }
                if (e.key === 'f' || e.key === 'F') {
                    document.getElementById('fullscreenBtn').click();
                }
            });

            canvas.addEventListener('dblclick', () => {
                if (isPlaying && !isPaused) {
                    document.getElementById('pauseBtn').click();
                } else {
                    document.getElementById('playBtn').click();
                }
            });

            // Listen for storage changes (when admin panel updates)
            window.addEventListener('storage', (e) => {
                if (e.key === 'selectedRom') {
                    loadRomFromStorage();
                }
            });

            // Disable controls if no ROM loaded
            if (!currentRom) {
                document.getElementById('playBtn').disabled = true;
                document.getElementById('pauseBtn').disabled = true;
                document.getElementById('resetBtn').disabled = true;
            }
        }

        init();
    })();
</script>
</body>
</html>
