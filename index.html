<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 RetroStation · PS2 Emulator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e17;
            color: #e0e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: radial-gradient(ellipse at center, #141e2b 0%, #070b11 100%);
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: rgba(14, 20, 30, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 30px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(255, 200, 50, 0.1);
            border: 1px solid rgba(255, 200, 50, 0.08);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 1px solid #1e2a3a;
            padding-bottom: 15px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 600;
            color: #f5e7b0;
            text-shadow: 0 0 20px rgba(255, 180, 50, 0.2);
        }
        .header h1 i {
            color: #f5c542;
            margin-right: 10px;
        }
        .header .badge {
            background: #1a2535;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            border: 1px solid #2a3a50;
            color: #9ab0cc;
        }
        .upload-zone {
            background: #101a26;
            border: 2px dashed #2f4058;
            border-radius: 24px;
            padding: 35px 20px;
            text-align: center;
            margin-bottom: 25px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: #f5c542;
            background: #16202e;
            box-shadow: inset 0 0 30px rgba(245, 197, 66, 0.05);
        }
        .upload-zone .icon {
            font-size: 48px;
            color: #f5c542;
            margin-bottom: 12px;
            display: block;
        }
        .upload-zone p {
            color: #8aa3c0;
            font-size: 16px;
        }
        .upload-zone .file-input {
            display: none;
        }
        .upload-zone .btn-upload {
            display: inline-block;
            background: #f5c542;
            color: #0a0e17;
            padding: 12px 32px;
            border-radius: 50px;
            font-weight: 600;
            margin-top: 15px;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            font-size: 16px;
        }
        .upload-zone .btn-upload:hover {
            background: #ffd866;
            transform: scale(1.02);
        }
        .status-bar {
            background: #111d2b;
            border-radius: 16px;
            padding: 12px 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border: 1px solid #1f2d3f;
        }
        .status-bar .info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }
        .status-bar .info i {
            color: #f5c542;
        }
        .status-bar .count {
            background: #1f2d40;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 13px;
        }
        .game-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }
        @media (max-width: 850px) {
            .game-grid {
                grid-template-columns: 1fr;
            }
        }
        .emulator-box {
            background: #0c1520;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #1d2a3a;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.4);
        }
        .emulator-box h2 {
            font-size: 18px;
            font-weight: 400;
            color: #b8cee8;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .emulator-box h2 i {
            color: #f5c542;
        }
        #gameCanvas {
            width: 100%;
            aspect-ratio: 4/3;
            background: #080e18;
            border-radius: 16px;
            display: block;
            border: 1px solid #1f2f42;
            image-rendering: pixelated;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .controls button {
            background: #1a2638;
            border: none;
            color: #d0def0;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid #2d3e55;
            box-shadow: 0 3px 0 #0b1119;
        }
        .controls button:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 #0b1119;
        }
        .controls button i {
            color: #f5c542;
        }
        .controls button:hover {
            background: #23324a;
            border-color: #f5c542;
        }
        .controls button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .rom-list-box {
            background: #0c1520;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #1d2a3a;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .rom-list-box h2 {
            font-size: 18px;
            font-weight: 400;
            color: #b8cee8;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .rom-list-box h2 i {
            color: #f5c542;
        }
        .rom-list {
            background: #080f19;
            border-radius: 16px;
            padding: 8px;
            max-height: 280px;
            overflow-y: auto;
            border: 1px solid #1a2535;
        }
        .rom-list::-webkit-scrollbar {
            width: 5px;
        }
        .rom-list::-webkit-scrollbar-track {
            background: #0a111e;
        }
        .rom-list::-webkit-scrollbar-thumb {
            background: #2f4058;
            border-radius: 10px;
        }
        .rom-item {
            padding: 10px 14px;
            border-bottom: 1px solid #141f2e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.1s;
            border-radius: 8px;
        }
        .rom-item:hover {
            background: #162230;
        }
        .rom-item.active {
            background: #1f3150;
            border-left: 3px solid #f5c542;
        }
        .rom-item .name {
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 160px;
        }
        .rom-item .size {
            font-size: 12px;
            opacity: 0.6;
            background: #141f2e;
            padding: 2px 12px;
            border-radius: 20px;
        }
        .rom-item .load-badge {
            font-size: 11px;
            color: #f5c542;
            margin-left: 8px;
        }
        .empty-msg {
            text-align: center;
            color: #556a82;
            padding: 30px 0;
            font-size: 14px;
        }
        .rom-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .rom-actions button {
            background: transparent;
            border: 1px solid #2d4058;
            color: #b0c8e0;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .rom-actions button:hover {
            background: #1a2538;
            border-color: #f5c542;
            color: #f5e7b0;
        }
        .rom-actions button.danger:hover {
            border-color: #e74c5e;
            color: #e74c5e;
        }
        .toast {
            margin-top: 15px;
            background: #111d2b;
            padding: 12px 20px;
            border-radius: 16px;
            border-left: 4px solid #f5c542;
            font-size: 14px;
            color: #b8cee8;
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: 50px;
        }
        .toast i {
            color: #f5c542;
            font-size: 18px;
        }
        .key-hint {
            font-size: 11px;
            opacity: 0.4;
            margin-top: 8px;
            text-align: center;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #1a2535;
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
            display: none;
        }
        .progress-bar .progress-fill {
            height: 100%;
            background: #f5c542;
            width: 0%;
            transition: width 0.3s;
            border-radius: 4px;
        }
        .progress-bar.active {
            display: block;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-gamepad"></i> RetroStation · PS2</h1>
        <span class="badge"><i class="fas fa-microchip"></i> Browser Emulator</span>
    </div>

    <!-- Upload Zone -->
    <div class="upload-zone" id="uploadZone">
        <i class="fas fa-cloud-upload-alt icon"></i>
        <p>Drag & drop your PS2 ROM files here, or click to browse</p>
        <p style="font-size:13px; color:#6a82a0; margin-top:6px;">Supports .bin, .iso, .img, .rom</p>
        <input type="file" id="fileInput" class="file-input" accept=".bin,.iso,.img,.rom" multiple>
        <button class="btn-upload" id="uploadBtn"><i class="fas fa-folder-open"></i> Choose Files</button>
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <!-- Status -->
    <div class="status-bar">
        <div class="info">
            <i class="fas fa-circle" id="statusIndicator" style="color:#7bed7b; font-size:12px;"></i>
            <span id="statusText">Ready</span>
        </div>
        <div class="count" id="romCount">0 ROMs</div>
    </div>

    <!-- Main Grid -->
    <div class="game-grid">
        <!-- Emulator -->
        <div class="emulator-box">
            <h2><i class="fas fa-tv"></i> PS2 Emulator</h2>
            <canvas id="gameCanvas" width="640" height="480"></canvas>
            <div class="controls">
                <button id="playBtn" disabled><i class="fas fa-play"></i> Play</button>
                <button id="pauseBtn" disabled><i class="fas fa-pause"></i> Pause</button>
                <button id="resetBtn" disabled><i class="fas fa-redo-alt"></i> Reset</button>
                <button id="fullscreenBtn"><i class="fas fa-expand"></i> Full</button>
            </div>
            <div class="key-hint">Space: Play/Pause · R: Reset · F: Fullscreen</div>
        </div>

        <!-- ROM List -->
        <div class="rom-list-box">
            <h2><i class="fas fa-archive"></i> Uploaded ROMs</h2>
            <div class="rom-list" id="romList">
                <div class="empty-msg">📂 No ROMs uploaded yet</div>
            </div>
            <div class="rom-actions">
                <button id="loadFirstBtn"><i class="fas fa-play-circle"></i> Load First</button>
                <button id="clearBtn" class="danger"><i class="fas fa-trash-alt"></i> Clear All</button>
            </div>
            <div class="toast" id="toastMessage">
                <i class="fas fa-info-circle"></i>
                <span>Upload a ROM to get started</span>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        'use strict';

        // --- DOM refs ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const uploadZone = document.getElementById('uploadZone');
        const statusText = document.getElementById('statusText');
        const statusIndicator = document.getElementById('statusIndicator');
        const romCount = document.getElementById('romCount');
        const romListEl = document.getElementById('romList');
        const toastMsg = document.getElementById('toastMessage');
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const loadFirstBtn = document.getElementById('loadFirstBtn');
        const clearBtn = document.getElementById('clearBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');

        // --- State ---
        let roms = [];
        let currentIndex = -1;
        let isPlaying = false;
        let isPaused = false;
        let animFrame = null;
        let frame = 0;
        let currentRomData = null;

        // --- Toast ---
        function toast(msg, isGood = true) {
            const icon = isGood ? 'fa-check-circle' : 'fa-exclamation-triangle';
            toastMsg.innerHTML = `<i class="fas ${icon}"></i><span>${msg}</span>`;
        }

        // --- Update status ---
        function updateStatus(text, isGood = true) {
            statusText.textContent = text;
            statusIndicator.style.color = isGood ? '#7bed7b' : '#ff6b6b';
        }

        // --- Draw functions ---
        function drawPlaceholder(text = '🎮 PS2 Ready') {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#0a121e');
            grad.addColorStop(1, '#162230');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.shadowColor = 'rgba(245,197,66,0.3)';
            ctx.shadowBlur = 30;
            ctx.fillStyle = '#f5e7b0';
            ctx.font = 'bold 42px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, canvas.width/2, canvas.height/2 - 20);
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#6a82a0';
            ctx.font = '18px monospace';
            ctx.fillText('⬆ Upload a ROM', canvas.width/2, canvas.height/2 + 50);
        }

        function drawGameScreen(romName) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const grad = ctx.createRadialGradient(200, 200, 100, 400, 300, 500);
            grad.addColorStop(0, '#1a2a40');
            grad.addColorStop(1, '#080e18');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // PS2 Logo
            ctx.shadowColor = 'rgba(245,197,66,0.2)';
            ctx.shadowBlur = 25;
            ctx.fillStyle = '#f5e7b0';
            ctx.font = 'bold 40px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('PLAYSTATION®2', canvas.width/2, 100);

            ctx.shadowBlur = 0;
            
            // Game info
            ctx.fillStyle = '#b8cee8';
            ctx.font = '24px monospace';
            ctx.fillText(`🎮 ${romName}`, canvas.width/2, 200);

            // Emulation info
            ctx.fillStyle = '#6a82a0';
            ctx.font = '16px sans-serif';
            ctx.fillText('⬆ Controls: Play / Pause / Reset', canvas.width/2, 300);

            // Memory card info
            ctx.fillStyle = 'rgba(255,255,255,0.03)';
            ctx.fillRect(20, canvas.height - 40, 100, 20);
            ctx.fillStyle = '#4a5a70';
            ctx.font = '10px monospace';
            ctx.textAlign = 'left';
            ctx.fillText('📀 Memory Card 8MB', 24, canvas.height - 26);

            // Scanline overlay
            ctx.fillStyle = 'rgba(255,255,255,0.02)';
            for (let i = 0; i < 20; i++) {
                const y = (frame * 2 + i * 26) % canvas.height;
                ctx.fillRect(0, y, canvas.width, 2);
            }

            // Status overlay
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            ctx.fillRect(10, 10, 180, 24);
            ctx.fillStyle = '#8aa3c0';
            ctx.font = '11px monospace';
            ctx.textAlign = 'left';
            ctx.fillText(`▶ ${romName}  ·  ${isPlaying ? 'Playing' : 'Paused'}`, 18, 28);
        }

        // --- ROM management ---
        function renderRomList() {
            if (roms.length === 0) {
                romListEl.innerHTML = '<div class="empty-msg">📂 No ROMs uploaded yet</div>';
                romCount.textContent = '0 ROMs';
                return;
            }
            let html = '';
            roms.forEach((rom, idx) => {
                const active = idx === currentIndex ? 'active' : '';
                const sizeMB = (rom.size / (1024 * 1024)).toFixed(1);
                const loaded = idx === currentIndex ? '<span class="load-badge"><i class="fas fa-check-circle"></i></span>' : '';
                html += `
                    <div class="rom-item ${active}" data-index="${idx}">
                        <span class="name">${rom.name} ${loaded}</span>
                        <span class="size">${sizeMB} MB</span>
                    </div>
                `;
            });
            romListEl.innerHTML = html;
            romCount.textContent = `${roms.length} ROMs`;

            // Click handler for each item
            document.querySelectorAll('.rom-item').forEach(el => {
                el.addEventListener('click', function() {
                    const idx = parseInt(this.dataset.index);
                    loadRom(idx);
                });
            });
        }

        function loadRom(index) {
            if (index < 0 || index >= roms.length) {
                toast('ROM not found', false);
                return false;
            }
            
            const rom = roms[index];
            currentIndex = index;
            currentRomData = rom.dataURL;
            
            drawGameScreen(rom.name);
            updateStatus(`Loaded: ${rom.name}`);
            toast(`✅ Loaded "${rom.name}"`);
            
            // Enable controls
            playBtn.disabled = false;
            pauseBtn.disabled = false;
            resetBtn.disabled = false;
            
            renderRomList();
            
            // If was playing, restart
            if (isPlaying) {
                startEmulation();
            }
            return true;
        }

        // --- Emulation ---
        function startEmulation() {
            if (currentIndex === -1) {
                toast('Load a ROM first', false);
                return;
            }
            
            if (isPaused) {
                isPaused = false;
                isPlaying = true;
                toast('▶️ Resumed');
                return;
            }
            
            isPlaying = true;
            isPaused = false;
            toast('▶️ Playing');
            
            if (animFrame) {
                cancelAnimationFrame(animFrame);
                animFrame = null;
            }
            
            const rom = roms[currentIndex];
            
            function emulate() {
                if (!isPlaying || isPaused) {
                    if (!isPaused) {
                        animFrame = null;
                    }
                    return;
                }
                
                drawGameScreen(rom.name);
                
                // Simulate game rendering with some random effects
                ctx.fillStyle = `rgba(100,200,255,${0.01 + Math.sin(frame * 0.03) * 0.005})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Random "pixel" effects to simulate graphics
                for (let i = 0; i < 3; i++) {
                    const x = Math.random() * canvas.width;
                    const y = Math.random() * canvas.height;
                    ctx.fillStyle = `rgba(255,255,255,${0.01 + Math.random() * 0.02})`;
                    ctx.fillRect(x, y, 2, 2);
                }
                
                // FPS counter
                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.fillRect(canvas.width - 80, 10, 70, 20);
                ctx.fillStyle = '#6a82a0';
                ctx.font = '10px monospace';
                ctx.textAlign = 'right';
                ctx.fillText(`FPS: ${Math.round(60 + Math.sin(frame * 0.1) * 5)}`, canvas.width - 14, 26);
                
                frame++;
                animFrame = requestAnimationFrame(emulate);
            }
            
            emulate();
        }

        function pauseEmulation() {
            if (currentIndex === -1) {
                toast('No ROM loaded', false);
                return;
            }
            
            if (isPlaying && !isPaused) {
                isPaused = true;
                isPlaying = false;
                toast('⏸️ Paused');
                if (animFrame) {
                    cancelAnimationFrame(animFrame);
                    animFrame = null;
                }
                drawGameScreen(roms[currentIndex].name);
            } else if (isPaused) {
                // Resume
                isPaused = false;
                isPlaying = true;
                toast('▶️ Resumed');
                startEmulation();
            } else {
                toast('Nothing to pause', false);
            }
        }

        function resetEmulation() {
            if (currentIndex === -1) {
                toast('No ROM loaded', false);
                return;
            }
            
            if (animFrame) {
                cancelAnimationFrame(animFrame);
                animFrame = null;
            }
            
            isPlaying = false;
            isPaused = false;
            frame = 0;
            
            drawGameScreen(roms[currentIndex].name);
            toast('🔄 Reset');
            updateStatus(`Reset: ${roms[currentIndex].name}`);
            
            // Auto-play after reset
            setTimeout(() => {
                if (currentIndex !== -1) {
                    isPlaying = true;
                    startEmulation();
                }
            }, 500);
        }

        // --- File handling ---
        function handleFiles(files) {
            if (!files || files.length === 0) return;
            
            let totalFiles = files.length;
            let processed = 0;
            
            progressBar.classList.add('active');
            
            for (let f of files) {
                const ext = f.name.split('.').pop().toLowerCase();
                if (!['bin', 'iso', 'img', 'rom'].includes(ext)) {
                    toast(`⚠️ Skipped "${f.name}" (unsupported format)`, false);
                    processed++;
                    updateProgress(processed, totalFiles);
                    continue;
                }
                if (f.size === 0) {
                    toast(`⚠️ "${f.name}" is empty`, false);
                    processed++;
                    updateProgress(processed, totalFiles);
                    continue;
                }
                if (f.size > 4 * 1024 * 1024 * 1024) {
                    toast(`⚠️ "${f.name}" is too large (max 4GB)`, false);
                    processed++;
                    updateProgress(processed, totalFiles);
                    continue;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const dataURL = e.target.result;
                        roms.push({
                            name: f.name,
                            dataURL: dataURL,
                            size: f.size
                        });
                        processed++;
                        updateProgress(processed, totalFiles);
                        renderRomList();
                        updateStatus(`Ready · ${roms.length} ROMs`);
                        toast(`✅ "${f.name}" added`);
                        
                        // Auto-load first ROM
                        if (roms.length === 1 && currentIndex === -1) {
                            setTimeout(() => loadRom(0), 500);
                        }
                    } catch(err) {
                        toast(`❌ Error processing "${f.name}"`, false);
                        processed++;
                        updateProgress(processed, totalFiles);
                    }
                };
                reader.onerror = function() {
                    toast(`❌ Failed to read "${f.name}"`, false);
                    processed++;
                    updateProgress(processed, totalFiles);
                };
                reader.readAsDataURL(f);
            }
        }

        function updateProgress(processed, total) {
            const percent = (processed / total) * 100;
            progressFill.style.width = percent + '%';
            if (processed >= total) {
                setTimeout(() => {
                    progressBar.classList.remove('active');
                    progressFill.style.width = '0%';
                }, 1000);
            }
        }

        // --- Clear all ---
        function clearAll() {
            if (roms.length === 0) {
                toast('No ROMs to clear', false);
                return;
            }
            
            if (animFrame) {
                cancelAnimationFrame(animFrame);
                animFrame = null;
            }
            
            roms = [];
            currentIndex = -1;
            currentRomData = null;
            isPlaying = false;
            isPaused = false;
            frame = 0;
            
            playBtn.disabled = true;
            pauseBtn.disabled = true;
            resetBtn.disabled = true;
            
            renderRomList();
            drawPlaceholder('🎮 PS2 Ready');
            updateStatus('Ready');
            toast('🗑️ All ROMs cleared');
        }

        // --- Toggle fullscreen ---
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                canvas.requestFullscreen?.() || canvas.webkitRequestFullscreen?.();
            } else {
                document.exitFullscreen?.() || document.webkitExitFullscreen?.();
            }
        }

        // --- Load first ROM ---
        function loadFirstRom() {
            if (roms.length === 0) {
                toast('No ROMs uploaded', false);
                return;
            }
            loadRom(0);
        }

        // --- Init ---
        function init() {
            drawPlaceholder('🎮 PS2 Ready');
            renderRomList();
            updateStatus('Ready');
            playBtn.disabled = true;
            pauseBtn.disabled = true;
            resetBtn.disabled = true;

            // Upload button triggers file input
            uploadBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                fileInput.click();
            });
            
            uploadZone.addEventListener('click', () => fileInput.click());

            // File input change
            fileInput.addEventListener('change', function(e) {
                if (this.files && this.files.length > 0) {
                    handleFiles(this.files);
                }
                this.value = '';
            });

            // Drag and drop
            uploadZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadZone.classList.add('dragover');
            });
            uploadZone.addEventListener('dragleave', () => {
                uploadZone.classList.remove('dragover');
            });
            uploadZone.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadZone.classList.remove('dragover');
                if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                    handleFiles(e.dataTransfer.files);
                }
            });

            // Controls
            playBtn.addEventListener('click', startEmulation);
            pauseBtn.addEventListener('click', pauseEmulation);
            resetBtn.addEventListener('click', resetEmulation);
            fullscreenBtn.addEventListener('click', toggleFullscreen);
            loadFirstBtn.addEventListener('click', loadFirstRom);
            clearBtn.addEventListener('click', clearAll);

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    if (!playBtn.disabled) {
                        if (isPlaying && !isPaused) {
                            pauseBtn.click();
                        } else if (isPaused) {
                            playBtn.click();
                        } else {
                            playBtn.click();
                        }
                    }
                }
                if (e.key === 'r' || e.key === 'R') {
                    if (!resetBtn.disabled) resetBtn.click();
                }
                if (e.key === 'f' || e.key === 'F') {
                    fullscreenBtn.click();
                }
            });

            // Double-click canvas to toggle
            canvas.addEventListener('dblclick', () => {
                if (!playBtn.disabled) {
                    if (isPlaying && !isPaused) {
                        pauseBtn.click();
                    } else {
                        playBtn.click();
                    }
                }
            });

            toast('🎮 Ready! Upload a ROM to start');
        }

        init();
    })();
</script>
</body>
</html>
