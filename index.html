<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 RetroStation · PS2 online</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #0b0e14;
            color: #eaeef2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background-image: radial-gradient(circle at 20% 30%, #1a232e 0%, #0a0d12 90%);
        }

        .retro-card {
            max-width: 1100px;
            width: 100%;
            background: rgba(18, 24, 33, 0.85);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 2.5rem;
            padding: 2rem 2rem 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 215, 0, 0.15);
            border: 1px solid rgba(255, 215, 0, 0.2);
            transition: all 0.2s;
        }

        h1 {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 500;
            letter-spacing: 1px;
            font-size: 2.2rem;
            margin-bottom: 0.25rem;
            color: #f6e9b2;
            text-shadow: 0 0 8px #ffb34740;
        }

        h1 i {
            color: #f5c542;
            filter: drop-shadow(0 0 6px #f5a623);
        }

        .subhead {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px dashed #3a4555;
            padding-bottom: 0.75rem;
        }

        .subhead span {
            opacity: 0.7;
            font-size: 0.95rem;
            background: #1f2a36;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            border: 1px solid #3e4b5e;
        }

        .upload-area {
            background: #121a24;
            border-radius: 2rem;
            padding: 1.8rem 1.5rem;
            margin-bottom: 2.2rem;
            border: 2px dashed #4d5e74;
            transition: 0.2s;
            text-align: center;
            box-shadow: inset 0 0 10px #00000055;
        }

        .upload-area:hover {
            border-color: #eab543;
            background: #18212e;
        }

        .upload-area label {
            display: inline-block;
            background: #eab543;
            color: #121a24;
            font-weight: 600;
            padding: 0.8rem 2.2rem;
            border-radius: 60px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 4px 0 #8f6f2a;
            border: 1px solid #ffdd77;
        }

        .upload-area label i {
            margin-right: 10px;
        }

        .upload-area label:hover {
            background: #f5c85a;
            transform: scale(1.01);
            box-shadow: 0 6px 0 #8f6f2a;
        }

        .upload-area input[type="file"] {
            display: none;
        }

        .file-status {
            margin-top: 1rem;
            font-size: 0.95rem;
            color: #b6c8db;
            background: #1b2533;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            display: inline-block;
        }

        .game-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.8rem;
            margin-top: 0.5rem;
        }

        @media (max-width: 700px) {
            .game-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            .retro-card {
                padding: 1.5rem;
            }
            h1 {
                font-size: 1.8rem;
            }
        }

        .emulator-box {
            background: #0e151f;
            border-radius: 1.8rem;
            padding: 1.5rem 1.2rem 1.2rem;
            box-shadow: inset 0 0 0 1px #2f3d4e, 0 10px 20px #00000055;
        }

        .emulator-box h2 {
            font-size: 1.2rem;
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #c7d6e8;
            border-bottom: 1px solid #293544;
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
        }

        .emulator-box h2 i {
            color: #f5c542;
        }

        #gameCanvas {
            background: #0c121c;
            border-radius: 1.2rem;
            width: 100%;
            aspect-ratio: 4/3;
            display: block;
            box-shadow: 0 0 0 1px #304050, 0 8px 16px #00000080;
            image-rendering: crisp-edges; /* retro feel */
        }

        .controls-panel {
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 0.6rem 1.2rem;
        }

        .ctrl-btn {
            background: #1f2b3a;
            border: none;
            border-radius: 40px;
            color: #d6e2f0;
            padding: 0.5rem 1.2rem;
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 0 #0b1119, 0 2px 8px #00000066;
            transition: 0.08s linear;
            cursor: pointer;
            border: 1px solid #3f5167;
        }

        .ctrl-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0b1119;
        }

        .ctrl-btn i {
            color: #f5c542;
        }

        .ctrl-btn.active-btn {
            background: #2f4057;
            border-color: #eab543;
        }

        .info-side {
            background: #0e151f;
            border-radius: 1.8rem;
            padding: 1.5rem 1.2rem;
            box-shadow: inset 0 0 0 1px #2f3d4e, 0 10px 20px #00000055;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .info-side h2 {
            font-size: 1.2rem;
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #c7d6e8;
            border-bottom: 1px solid #293544;
            padding-bottom: 0.5rem;
        }

        .rom-list {
            background: #0b121d;
            border-radius: 1.2rem;
            padding: 0.8rem 1rem;
            max-height: 200px;
            overflow-y: auto;
            font-size: 0.9rem;
            border: 1px solid #273546;
        }

        .rom-list ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .rom-list li {
            padding: 0.5rem 0.3rem;
            border-bottom: 1px solid #1d2a39;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #bacee2;
        }

        .rom-list li:last-child {
            border-bottom: none;
        }

        .rom-list .rom-name {
            font-weight: 400;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }

        .rom-list .rom-size {
            opacity: 0.6;
            font-size: 0.75rem;
            background: #192433;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
        }

        .empty-roms {
            opacity: 0.5;
            text-align: center;
            padding: 1rem 0;
        }

        .footer-actions {
            margin-top: 1.2rem;
            display: flex;
            justify-content: flex-end;
            gap: 0.8rem;
        }

        .clear-btn {
            background: transparent;
            border: 1px solid #5b6f89;
            color: #b0c5dd;
            padding: 0.35rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.15s;
        }

        .clear-btn:hover {
            background: #3c2a2a;
            border-color: #c78a7a;
            color: #f0d8d0;
        }

        .toast-msg {
            margin-top: 1.2rem;
            background: #1d2b38;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            color: #bfd3e8;
            font-size: 0.9rem;
            border-left: 4px solid #eab543;
        }

        /* scrollbar */
        .rom-list::-webkit-scrollbar {
            width: 6px;
        }
        .rom-list::-webkit-scrollbar-track {
            background: #0d1622;
        }
        .rom-list::-webkit-scrollbar-thumb {
            background: #3a4f68;
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="retro-card">
    <h1><i class="fas fa-gamepad"></i> RetroStation · PS2</h1>
    <div class="subhead">
        <span><i class="fas fa-cloud-upload-alt"></i>  upload & play  </span>
        <span><i class="fas fa-microchip"></i>  browser emulator  </span>
    </div>

    <!-- upload area -->
    <div class="upload-area" id="uploadArea">
        <label for="romUpload"><i class="fas fa-folder-open"></i>  Choose PS2 ROM  (.bin/.iso)</label>
        <input type="file" id="romUpload" accept=".bin,.iso,.img,.rom">
        <div class="file-status" id="fileStatus"><i class="fas fa-info-circle"></i>  no ROM loaded</div>
    </div>

    <!-- main grid: emulator + info -->
    <div class="game-grid">
        <!-- left: emulator canvas + controls -->
        <div class="emulator-box">
            <h2><i class="fas fa-tv"></i>  PS2 emulator</h2>
            <canvas id="gameCanvas" width="640" height="480"></canvas>
            <div class="controls-panel">
                <button class="ctrl-btn" id="playBtn"><i class="fas fa-play"></i> Play</button>
                <button class="ctrl-btn" id="pauseBtn"><i class="fas fa-pause"></i> Pause</button>
                <button class="ctrl-btn" id="resetBtn"><i class="fas fa-redo-alt"></i> Reset</button>
                <button class="ctrl-btn" id="fullscreenBtn"><i class="fas fa-expand"></i> Full</button>
            </div>
        </div>

        <!-- right: ROM list + info -->
        <div class="info-side">
            <h2><i class="fas fa-archive"></i>  uploaded ROMs</h2>
            <div class="rom-list" id="romListContainer">
                <ul id="romList">
                    <li class="empty-roms"><span>📂 no ROMs uploaded yet</span></li>
                </ul>
            </div>
            <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                <button class="ctrl-btn" id="loadFirstRomBtn" style="flex:1;"><i class="fas fa-play-circle"></i> Load first</button>
                <button class="clear-btn" id="clearRomsBtn"><i class="fas fa-trash-alt"></i> Clear all</button>
            </div>
            <div class="toast-msg" id="toastMessage"><i class="fas fa-lightbulb"></i>  upload a .bin/.iso to start</div>
        </div>
    </div>
    <div style="margin-top: 1.5rem; text-align: center; opacity: 0.4; font-size: 0.8rem; letter-spacing: 0.3px;">
        <i class="fas fa-shield-alt"></i>  all processing is local · ROMs stay in your browser
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ----- DOM refs -----
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const romUpload = document.getElementById('romUpload');
        const fileStatus = document.getElementById('fileStatus');
        const romListUl = document.getElementById('romList');
        const toastMsg = document.getElementById('toastMessage');
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const loadFirstBtn = document.getElementById('loadFirstRomBtn');
        const clearRomsBtn = document.getElementById('clearRomsBtn');

        // ----- state -----
        let roms = [];                // stored as { name, dataURL, size }
        let currentRomIndex = -1;     // -1 = none loaded
        let animationFrame = null;
        let isPlaying = false;

        // ----- helper: toast -----
        function showToast(msg, isGood = true) {
            toastMsg.innerHTML = `<i class="fas ${isGood ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i>  ${msg}`;
        }

        // ----- render a demo / placeholder on canvas (PS2 style) -----
        function drawPlaceholder(text = '🎮 PS2 ready') {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // dark gradient
            const grd = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grd.addColorStop(0, '#0a121c');
            grd.addColorStop(1, '#182433');
            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#b3cbdf';
            ctx.font = 'bold 36px "Segoe UI", system-ui, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = '#000000aa';
            ctx.shadowBlur = 18;
            ctx.fillText(text, canvas.width/2, canvas.height/2 - 20);

            ctx.font = '18px monospace';
            ctx.fillStyle = '#7b93ad';
            ctx.shadowBlur = 6;
            ctx.fillText('⬆ upload a ROM', canvas.width/2, canvas.height/2 + 50);
            ctx.shadowBlur = 0;
        }

        // ----- load ROM into canvas (simulate emulation) -----
        function loadRomByIndex(index) {
            if (index < 0 || index >= roms.length) {
                currentRomIndex = -1;
                drawPlaceholder('📂 no ROM');
                fileStatus.innerHTML = `<i class="fas fa-info-circle"></i>  no ROM loaded`;
                showToast('No ROM selected', false);
                return false;
            }

            const rom = roms[index];
            currentRomIndex = index;
            fileStatus.innerHTML = `<i class="fas fa-check-circle" style="color:#7bed7b;"></i>  loaded: ${rom.name}`;

            // draw a "game" screen (ps2 style) with the rom name
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const grd = ctx.createRadialGradient(200, 200, 50, 400, 300, 500);
            grd.addColorStop(0, '#1f334a');
            grd.addColorStop(1, '#0b111c');
            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.shadowBlur = 20;
            ctx.shadowColor = '#f5c54240';
            ctx.fillStyle = '#f5e7c8';
            ctx.font = 'bold 44px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('PS2 · emulation', canvas.width/2, 130);

            ctx.font = '24px monospace';
            ctx.fillStyle = '#bbd4ed';
            ctx.fillText(`🎮 ${rom.name}`, canvas.width/2, 250);

            ctx.font = '20px sans-serif';
            ctx.fillStyle = '#95adc9';
            ctx.fillText('⬆ controls: play / pause / reset', canvas.width/2, 360);
            ctx.shadowBlur = 0;

            showToast(`Loaded "${rom.name}"`, true);
            if (isPlaying) {
                // if playing, we animate a subtle effect (just to show activity)
                startEmulationLoop();
            }
            return true;
        }

        // ----- emulation loop (just for demo / visual feedback) -----
        function startEmulationLoop() {
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }
            if (!isPlaying) return;

            let frame = 0;
            function animate() {
                if (!isPlaying) {
                    animationFrame = null;
                    return;
                }
                if (currentRomIndex === -1) {
                    // if no ROM, draw placeholder but keep loop
                    drawPlaceholder('📂 no ROM');
                    animationFrame = requestAnimationFrame(animate);
                    return;
                }
                // subtle "scanline" effect to simulate emulation
                const rom = roms[currentRomIndex];
                ctx.drawImage(canvas, 0, 0); // keep previous
                ctx.fillStyle = '#ffffff08';
                for (let i = 0; i < 20; i++) {
                    const y = (frame * 3 + i * 28) % canvas.height;
                    ctx.fillRect(0, y, canvas.width, 2);
                }
                // overlay small text
                ctx.fillStyle = '#b3d0f0';
                ctx.font = '14px monospace';
                ctx.fillText(`▶ ${rom.name}  ·  frame ${frame++}`, 20, 40);
                ctx.fillStyle = '#f5c54230';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                animationFrame = requestAnimationFrame(animate);
            }
            animate();
        }

        // ----- stop emulation loop -----
        function stopEmulationLoop() {
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }
        }

        // ----- render ROM list -----
        function renderRomList() {
            romListUl.innerHTML = '';
            if (roms.length === 0) {
                romListUl.innerHTML = '<li class="empty-roms"><span>📂 no ROMs uploaded</span></li>';
                return;
            }
            roms.forEach((rom, idx) => {
                const li = document.createElement('li');
                const nameSpan = document.createElement('span');
                nameSpan.className = 'rom-name';
                nameSpan.textContent = rom.name;
                const sizeSpan = document.createElement('span');
                sizeSpan.className = 'rom-size';
                sizeSpan.textContent = (rom.size / 1024).toFixed(1) + ' KB';
                li.appendChild(nameSpan);
                li.appendChild(sizeSpan);
                li.style.cursor = 'pointer';
                li.addEventListener('click', (e) => {
                    e.stopPropagation();
                    loadRomByIndex(idx);
                });
                romListUl.appendChild(li);
            });
        }

        // ----- add ROM from file -----
        function handleRomFile(file) {
            const validTypes = ['application/octet-stream', 'application/x-iso9660-image', 'application/x-cd-image'];
            const ext = file.name.split('.').pop().toLowerCase();
            if (!['bin', 'iso', 'img', 'rom'].includes(ext)) {
                showToast('⚠️  Please upload .bin / .iso / .img', false);
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                const dataURL = e.target.result;
                const rom = {
                    name: file.name,
                    dataURL: dataURL,
                    size: file.size,
                };
                roms.push(rom);
                renderRomList();
                // auto-load if it's the first one
                if (roms.length === 1) {
                    loadRomByIndex(0);
                } else {
                    showToast(`✅ ${file.name} added`, true);
                }
                fileStatus.innerHTML = `<i class="fas fa-check-circle" style="color:#7bed7b;"></i>  ${roms.length} ROM(s) ready`;
            };
            reader.onerror = () => {
                showToast('❌ Error reading file', false);
            };
            reader.readAsDataURL(file);
        }

        // ----- clear all roms -----
        function clearAllRoms() {
            if (roms.length === 0) {
                showToast('No ROMs to clear', false);
                return;
            }
            roms = [];
            currentRomIndex = -1;
            stopEmulationLoop();
            isPlaying = false;
            renderRomList();
            drawPlaceholder('📂 no ROM');
            fileStatus.innerHTML = `<i class="fas fa-info-circle"></i>  no ROM loaded`;
            showToast('🗑️  All ROMs cleared', true);
        }

        // ----- load first rom (useful) -----
        function loadFirstRom() {
            if (roms.length === 0) {
                showToast('No ROMs uploaded yet', false);
                return;
            }
            loadRomByIndex(0);
        }

        // ----- reset current rom -----
        function resetCurrentRom() {
            if (currentRomIndex === -1 || roms.length === 0) {
                showToast('No ROM loaded to reset', false);
                return;
            }
            loadRomByIndex(currentRomIndex);
            showToast('🔄 Reset', true);
        }

        // ----- fullscreen canvas -----
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                canvas.requestFullscreen?.() || canvas.webkitRequestFullscreen?.();
            } else {
                document.exitFullscreen?.() || document.webkitExitFullscreen?.();
            }
        }

        // ----- init -----
        function init() {
            drawPlaceholder('🎮 PS2 ready');
            renderRomList();

            // upload
            romUpload.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    handleRomFile(e.target.files[0]);
                }
                romUpload.value = ''; // allow re-upload same file
            });

            // drag & drop on upload area
            const uploadArea = document.getElementById('uploadArea');
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.style.borderColor = '#f5c542';
            });
            uploadArea.addEventListener('dragleave', () => {
                uploadArea.style.borderColor = '#4d5e74';
            });
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.style.borderColor = '#4d5e74';
                if (e.dataTransfer.files.length > 0) {
                    handleRomFile(e.dataTransfer.files[0]);
                }
            });

            // controls
            playBtn.addEventListener('click', () => {
                if (currentRomIndex === -1) {
                    showToast('Load a ROM first', false);
                    return;
                }
                isPlaying = true;
                startEmulationLoop();
                showToast('▶️ Playing', true);
            });

            pauseBtn.addEventListener('click', () => {
                isPlaying = false;
                stopEmulationLoop();
                if (currentRomIndex !== -1) {
                    // keep the static image
                    showToast('⏸️ Paused', true);
                } else {
                    drawPlaceholder('⏸️ paused');
                }
            });

            resetBtn.addEventListener('click', resetCurrentRom);

            fullscreenBtn.addEventListener('click', toggleFullscreen);

            loadFirstBtn.addEventListener('click', loadFirstRom);

            clearRomsBtn.addEventListener('click', clearAllRoms);

            // extra: click on canvas to toggle play/pause?
            canvas.addEventListener('dblclick', () => {
                if (isPlaying) {
                    pauseBtn.click();
                } else {
                    playBtn.click();
                }
            });

            // if user leaves fullscreen
            document.addEventListener('fullscreenchange', () => {
                if (!document.fullscreenElement) {
                    // nothing
                }
            });
        }

        init();
    })();
</script>
</body>
</html>
